name: Deploy Backend to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma client
        run: |
          cd backend
          npx prisma generate

      - name: Build TypeScript
        run: |
          cd backend
          npm run build

      - name: Run tests
        run: |
          cd backend
          npm test

      - name: Create deployment archive
        run: |
          cd backend
          tar -czf ../backend-deploy.tar.gz \
            dist/ \
            prisma/ \
            package.json \
            package-lock.json

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FRONTEND_EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.FRONTEND_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.FRONTEND_EC2_HOST }}
        run: |
          scp -i ~/.ssh/deploy_key.pem backend-deploy.tar.gz ubuntu@${EC2_HOST}:/tmp/backend-deploy.tar.gz

          ssh -i ~/.ssh/deploy_key.pem ubuntu@${EC2_HOST} << 'ENDSSH'
            set -e

            # Backup current dist
            if [ -d /opt/kyle-portfolio/dist ]; then
              sudo tar -czf /opt/kyle-portfolio/dist.backup.$(date +%Y%m%d_%H%M%S).tar.gz \
                -C /opt/kyle-portfolio dist/ 2>/dev/null || true
            fi

            # Stop service
            sudo systemctl stop kyle-portfolio

            # Deploy new build
            cd /opt/kyle-portfolio
            sudo tar -xzf /tmp/backend-deploy.tar.gz
            sudo npm ci --omit=dev
            sudo npx prisma generate
            sudo npx prisma migrate deploy
            sudo chown -R ubuntu:ubuntu /opt/kyle-portfolio
            rm /tmp/backend-deploy.tar.gz

            # Start service
            sudo systemctl start kyle-portfolio
            sleep 5

            # Verify service started
            if sudo systemctl is-active --quiet kyle-portfolio; then
              echo "Service started successfully"
            else
              echo "Service failed to start"
              sudo journalctl -u kyle-portfolio -n 50 --no-pager
              exit 1
            fi

            # Health check
            if curl -sf http://localhost:8080/api/health; then
              echo "Health check passed"
            else
              echo "Health check failed"
              sudo journalctl -u kyle-portfolio -n 20 --no-pager
              exit 1
            fi
          ENDSSH

      - name: Send notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "Backend deployment successful"
          else
            echo "Backend deployment failed"
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key.pem
          rm -f backend-deploy.tar.gz
